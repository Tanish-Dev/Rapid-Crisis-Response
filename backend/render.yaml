services:
  - type: web
    name: rapid-crisis-response
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://emergency-core.netlify.app
      - key: FIRESTORE_COLLECTION
        value: incidents
      - key: GOOGLE_GEMINI_MODEL
        value: gemini-2.5-flash
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
